; g102-custom-fw — custom firmware for Logitech G102 (STM32F072CB + "1855" sensor)
;
; Flash layout:
;   0x08000000 .. 0x08003FFF  bootloader  (16 KB)
;   0x08004000 .. 0x0801FFFF  firmware    (112 KB)

[platformio]
default_envs = bootloader
src_dir = .

[env]
platform = ststm32
framework = libopencm3
board = elektor_f072cb
upload_protocol = stlink
debug_tool = stlink
build_flags =
    -Wall -Wextra -Wno-unused-parameter
    -Os -ffunction-sections -fdata-sections -fno-common
    -fno-exceptions -fno-unwind-tables
    -flto
build_unflags = -Og
monitor_speed = 115200

; Bootloader stays on C — it's small, stable, low risk.
[env:bootloader]
board_build.ldscript = bootloader/link.ld
build_src_filter = +<bootloader/src/>
build_flags =
    ${env.build_flags}
    -DBOOTLOADER
    -Ibootloader/src -Icommon

; Firmware is C++17. No exceptions, no RTTI, no STL runtime.
[env:firmware]
board_build.ldscript = firmware/link.ld
build_src_filter = +<firmware/src/>
build_flags =
    ${env.build_flags}
    -DFIRMWARE
    -DVECT_TAB_OFFSET=0x4000
    -Ifirmware/src -Icommon
    -std=gnu++17
    -fno-rtti
    -fno-threadsafe-statics
    -fno-use-cxa-atexit
build_unflags =
    ${env.build_unflags}
    -std=gnu11
    -flto
